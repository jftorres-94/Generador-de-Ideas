name: Deploy con clave segura

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inyectar API Key en las apps
        run: |
          sed -i "s|ANTHROPIC_KEY_PLACEHOLDER|${{ secrets.ANTHROPIC_KEY }}|g" ideagen.html
          sed -i "s|ANTHROPIC_KEY_PLACEHOLDER|${{ secrets.ANTHROPIC_KEY }}|g" pitchugc.html

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
